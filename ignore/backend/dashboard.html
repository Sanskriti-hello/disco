<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050510;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #050510 0%, #1a1a2e 100%);
            color: white;
            z-index: 9999;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(99, 117, 197, 0.2);
            border-top-color: #6375c5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #error {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050510;
            color: white;
            padding: 40px;
            text-align: center;
        }

        #error h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        #error p {
            font-size: 18px;
            color: #ffffff99;
            max-width: 600px;
            margin-bottom: 30px;
        }

        #error button {
            padding: 12px 24px;
            background: #6375c5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #error button:hover {
            opacity: 0.8;
        }

        #sandbox-container {
            display: none;
            width: 100%;
            height: 100%;
        }

        #sandbox-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #fallback-dashboard {
            display: none;
            width: 100%;
            height: 100%;
            overflow: auto;
            padding: 40px;
            background: linear-gradient(135deg, #050510 0%, #1a1a2e 100%);
        }

        .dashboard-header {
            max-width: 1200px;
            margin: 0 auto 40px;
            text-align: center;
        }

        .dashboard-header h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 12px;
        }

        .dashboard-header .domain-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(99, 117, 197, 0.2);
            border: 1px solid #6375c5;
            border-radius: 20px;
            color: #6375c5;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .dashboard-header p {
            color: #ffffff99;
            font-size: 18px;
        }

        .data-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .data-card {
            background: rgba(99, 117, 197, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .data-card:hover {
            transform: translateY(-4px);
            border-color: #6375c5;
        }

        .data-card h3 {
            color: white;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .data-card p {
            color: #ffffff99;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .data-card a {
            color: #6375c5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .data-card a:hover {
            text-decoration: underline;
        }

        .json-viewer {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            color: #10B981;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow: auto;
            max-height: 400px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>

<body>
    <!-- Loading State -->
    <div id="loading">
        <div class="spinner"></div>
        <h2>Loading Dashboard...</h2>
        <p style="color: #ffffff99; margin-top: 12px;">Preparing your AI-powered workspace</p>
    </div>

    <!-- Error State -->
    <div id="error">
        <h1>⚠️</h1>
        <h2>Dashboard Not Found</h2>
        <p>No dashboard configuration was found. Please generate a dashboard first by clicking "Analyze Tabs" in the
            extension popup.</p>
        <button onclick="goHome()">← Go Back Home</button>
    </div>

    <!-- CodeSandbox Container (Preferred) -->
    <div id="sandbox-container"></div>

    <!-- Fallback Dashboard (If no CodeSandbox) -->
    <div id="fallback-dashboard">
        <div class="dashboard-header">
            <div id="domain-badge" class="domain-badge"></div>
            <h1 id="template-name"></h1>
            <p id="template-desc"></p>
        </div>
        <div id="data-container" class="data-grid"></div>
    </div>

    <script>
        // Chrome extension context check
        if (typeof chrome === 'undefined' || !chrome.storage) {
            console.error('Chrome extension APIs not available');
            showError();
        } else {
            loadDashboard();
        }

        function loadDashboard() {
            chrome.storage.local.get(['dashboardConfig'], (result) => {
                if (chrome.runtime.lastError) {
                    console.error('Storage error:', chrome.runtime.lastError);
                    showError();
                    return;
                }

                const config = result.dashboardConfig;

                if (!config || !config.success) {
                    console.error('No valid dashboard config found');
                    showError();
                    return;
                }

                console.log('Dashboard config loaded:', config);

                // Hide loading
                document.getElementById('loading').style.display = 'none';

                // Option 1: Show CodeSandbox iframe (PREFERRED)
                if (config.sandbox_embed_url) {
                    showCodeSandbox(config);
                }
                // Option 2: Fallback to custom rendering
                else {
                    showFallbackDashboard(config);
                }
            });
        }

        function showCodeSandbox(config) {
            const container = document.getElementById('sandbox-container');
            container.style.display = 'block';

            const iframe = document.createElement('iframe');
            iframe.src = config.sandbox_embed_url;
            iframe.allow = "accelerometer; ambient-light-sensor; camera; encrypted-media; geolocation; gyroscope; hid; microphone; midi; payment; usb; vr; xr-spatial-tracking";
            iframe.sandbox = "allow-forms allow-modals allow-popups allow-presentation allow-same-origin allow-scripts";
            iframe.title = config.selected_template || "Dashboard";

            // Add loading handler
            iframe.onload = () => {
                console.log('CodeSandbox loaded successfully');
            };

            iframe.onerror = () => {
                console.error('CodeSandbox failed to load');
                container.style.display = 'none';
                showFallbackDashboard(config);
            };

            container.appendChild(iframe);
        }

        function showFallbackDashboard(config) {
            const dashboard = document.getElementById('fallback-dashboard');
            dashboard.style.display = 'block';

            // Set header info
            document.getElementById('domain-badge').textContent = config.domain || 'General';
            document.getElementById('template-name').textContent = config.selected_template || 'Dashboard';
            document.getElementById('template-desc').textContent = `Generated using ${config.domain || 'generic'} domain intelligence`;

            // Render data
            const dataContainer = document.getElementById('data-container');
            const uiProps = config.ui_props || {};

            // Try to find renderable data
            let items = [];

            // Study domain
            if (uiProps.papers && Array.isArray(uiProps.papers)) {
                items = uiProps.papers.map(p => ({
                    title: p.title || 'Untitled Paper',
                    description: p.summary || p.abstract || 'No description',
                    url: p.pdf_url || p.url || '#'
                }));
            }
            // Shopping domain
            else if (uiProps.products && Array.isArray(uiProps.products)) {
                items = uiProps.products.map(p => ({
                    title: p.title || p.name || 'Product',
                    description: `Price: ${p.price || 'N/A'}`,
                    url: p.url || '#'
                }));
            }
            // Travel domain
            else if (uiProps.flights && Array.isArray(uiProps.flights)) {
                items = uiProps.flights.map(f => ({
                    title: f.airline || 'Flight',
                    description: `${f.price || ''} - ${f.duration || ''}`,
                    url: f.bookingUrl || '#'
                }));
            }
            // Code domain
            else if (uiProps.code_snippets && Array.isArray(uiProps.code_snippets)) {
                items = uiProps.code_snippets.map(c => ({
                    title: c.language || 'Code',
                    description: c.code?.substring(0, 200) + '...' || 'Code snippet',
                    url: '#'
                }));
            }
            // Entertainment domain
            else if (uiProps.videos && Array.isArray(uiProps.videos)) {
                items = uiProps.videos.map(v => ({
                    title: v.title || 'Video',
                    description: v.description || v.snippet || '',
                    url: v.url || '#'
                }));
            }
            // Generic fallback
            else {
                // Show raw JSON if no specific structure
                dataContainer.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <h3 style="color: white; margin-bottom: 16px;">Dashboard Data:</h3>
                        <div class="json-viewer">${JSON.stringify(uiProps, null, 2)}</div>
                    </div>
                `;
                return;
            }

            // Render items as cards
            if (items.length === 0) {
                dataContainer.innerHTML = '<p style="color: #ffffff99;">No data to display</p>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <h3>${escapeHtml(item.title)}</h3>
                    <p>${escapeHtml(item.description)}</p>
                    ${item.url && item.url !== '#' ? `<a href="${escapeHtml(item.url)}" target="_blank">View Details →</a>` : ''}
                `;
                dataContainer.appendChild(card);
            });
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'flex';
        }

        function goHome() {
            // Open newtab instead
            chrome.tabs.getCurrent((tab) => {
                chrome.tabs.update(tab.id, { url: chrome.runtime.getURL('dist/newtab.html') });
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>

</html>
